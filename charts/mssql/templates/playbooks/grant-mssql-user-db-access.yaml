{{- if and .Values.playbooks.enabled .Values.playbooks.grantAccess }}
apiVersion: mission-control.flanksource.com/v1
kind: Playbook
metadata:
  name: grant-mssql-access
spec:
  title: "Grant MSSQL Database User Access"
  icon: mssql
  configs:
    - types:
      - MSSQL::Database

  description: Grant an MSSQL user a database role
  parameters:
    - name: user
      label: Existing database User
      type: config
      properties:
        filter:
          - types:
              - MSSQL::Logon
    - name: role
      label: Database Role
      type: list
      properties:
        options:
          - label: "db_datareader"
            value: "db_datareader"
          - label: "db_datawriter"
            value: "db_datawriter"
          - label: "db_ddladmin"
            value: "db_ddladmin"
          - label: "db_backupoperator"
            value: "db_backupoperator"
          - label: "db_owner"
            value: "db_owner"
    - name: delay
      label: Expires after
      type: list
      properties:
        options:
          - label: "1 minute"
            value: "1m"
          - label: "4 hours"
            value: "4h"
          - label: "8 hours"
            value: "8h"
          - label: "3 days"
            value: "3d"
          - label: "10 days"
            value: "10d"
          - label: "2 weeks"
            value: "14d"
          - label: "30 days"
            value: "30d"
          - label: "Indefinitely"
            value: "0"
  {{ include "mssql.approvers" . | indent 2 | trim }}
  actions:
    - name: Assign Database User Roles
      if: "always()"
      sql:
        {{ include "mssql.connection-playbook" . }}
        driver: mssql
        query: |
{{ .Files.Get "conf/grant-db-access.sql" | indent 10 }}
    - name: Clear Rolebinding
      if: getAction('Assign Database User Roles').status != 'failed' && params.delay != "0"
      delay: ".params.delay"
      sql:
        {{ include "mssql.connection-playbook" . }}
        driver: mssql
        query: |
{{ .Files.Get "conf/revoke-db-access.sql" | indent 10 }}
{{- end }}
