{{- if and .Values.views.enabled .Values.views.clusterOverview.enabled (not .Values.global.prometheus.connection) }}
apiVersion: mission-control.flanksource.com/v1
kind: View
metadata:
  name: cluster-overview
  labels:
    {{- include "kubernetes-view.labels" . | nindent 4 }}
spec:
  cache:
    refreshTimeout: 30s
  templating:
    - key: cluster
      label: Cluster
      valueFrom:
        config:
          agent: "all"
          types:
            - Kubernetes::Cluster
  display:
    title: Cluster
    icon: kubernetes::cluster
    {{- if .Values.views.clusterOverview.sidebar }}
    sidebar: true
    {{- end }}
    table:
      sort: name
      size: 10
    plugins:
      - configTab:
          types:
            - Kubernetes::Cluster
  panels:
    - name: Resources
      description: Count of resources grouped by type
      type: table
      query: |
        SELECT
          CASE type
            WHEN 'Kubernetes::Node' THEN 'Nodes'
            WHEN 'Kubernetes::Namespace' THEN 'Namespaces'
            WHEN 'Kubernetes::Pod' THEN 'Running Pods'
            WHEN 'Kubernetes::Deployment' THEN 'Deployments'
            WHEN 'Kubernetes::StatefulSet' THEN 'StatefulSets'
            WHEN 'Kubernetes::DaemonSet' THEN 'DaemonSets'
            WHEN 'Kubernetes::PersistentVolume' THEN 'Persistent Volumes'
            WHEN 'Kubernetes::PersistentVolumeClaim' THEN 'Persistent Volume Claims'
            WHEN 'Kubernetes::Ingress' THEN 'Ingresses'
            WHEN 'Kubernetes::CronJob' THEN 'CronJobs'
          END AS resource_type,
          COUNT(*) AS value
        FROM resources
        WHERE type != 'Kubernetes::Pod'
          OR json_extract(config, '$.status.phase') = 'Running'
        GROUP BY type
        ORDER BY resource_type
    {{- if .Values.views.nodes.enabled }}
    - name: CPU Usage
      type: gauge
      query: |
        SELECT SUM(cpu) AS value
        FROM node_overview
        WHERE cluster IN (SELECT DISTINCT cluster FROM namespaces)
          AND cpu IS NOT NULL
        HAVING COUNT(cpu) > 0
      gauge:
        unit: millicore
        max: >-
          size(.dataset.namespaces) > 0 && size(.dataset.node_overview) > 0 ?
          .dataset.node_overview
            .filter(node, has(node.allocatable_cpu) && node.allocatable_cpu != null && node.cluster == .dataset.namespaces[0].cluster)
            .map(node, double(node.allocatable_cpu))
            .sum() : 0.0
        thresholds:
          - percent: 0
            color: '#28C19B'
          - percent: 70
            color: '#F4B23C'
          - percent: 85
            color: '#F25C54'
    - name: Memory Usage
      type: gauge
      query: |
        SELECT SUM(memory) AS value
        FROM node_overview
        WHERE cluster IN (SELECT DISTINCT cluster FROM namespaces)
          AND memory IS NOT NULL
        HAVING COUNT(memory) > 0
      gauge:
        max: >-
          size(.dataset.namespaces) > 0 && size(.dataset.node_overview) > 0 ?
          .dataset.node_overview
            .filter(node, has(node.allocatable_memory) && node.allocatable_memory != null && node.cluster == .dataset.namespaces[0].cluster)
            .map(node, double(node.allocatable_memory))
            .sum() : 0.0
        unit: bytes
        thresholds:
          - percent: 0
            color: '#28C19B'
          - percent: 70
            color: '#F4B23C'
          - percent: 85
            color: '#F25C54'
    {{- end }}
    {{- if .Values.views.pods.enabled }}
    - name: Pods Node Distribution
      description: Distribution of pods across nodes
      type: piechart
      piechart:
        showLabels: true
      query: |
        SELECT COUNT(*) AS count, node
        FROM pod_overview
        WHERE cluster IN (SELECT DISTINCT cluster FROM namespaces)
          AND node IS NOT NULL
        GROUP BY node
    {{- end }}
    {{- if .Values.views.nodes.enabled }}
    - name: Memory Real Usage
      type: bargauge
      query: |
        SELECT 'Real' AS name, ROUND(SUM(memory), 1) AS value
        FROM node_overview
        WHERE cluster IN (SELECT DISTINCT cluster FROM namespaces)
          AND memory IS NOT NULL
        HAVING COUNT(memory) > 0
      bargauge:
        group: "Memory"
        max: >-
          size(.dataset.namespaces) > 0 && size(.dataset.node_overview) > 0 ?
          .dataset.node_overview
            .filter(node, has(node.allocatable_memory) && node.allocatable_memory != null && node.cluster == .dataset.namespaces[0].cluster)
            .map(node, double(node.allocatable_memory))
            .sum() : 0.0
        unit: bytes
        thresholds:
          - percent: 0
            color: '#28C19B'
          - percent: 70
            color: '#F4B23C'
          - percent: 80
            color: '#F25C54'
    {{- end }}
    {{- if and .Values.views.pods.enabled .Values.views.nodes.enabled }}
    - name: Memory Requests
      type: bargauge
      query: |
        SELECT 'Requests' AS name, ROUND(SUM(memory_request), 1) AS value
        FROM pod_overview
        WHERE cluster IN (SELECT DISTINCT cluster FROM namespaces)
        HAVING COUNT(memory_request) > 0
      bargauge:
        group: "Memory"
        max: >-
          size(.dataset.namespaces) > 0 && size(.dataset.node_overview) > 0 ?
          .dataset.node_overview
            .filter(node, has(node.allocatable_memory) && node.allocatable_memory != null && node.cluster == .dataset.namespaces[0].cluster)
            .map(node, double(node.allocatable_memory))
            .sum() : 0.0
        unit: bytes
        format: percentage
        thresholds:
          - percent: 0
            color: '#F25C54'
          - percent: 30
            color: '#F4B23C'
          - percent: 70
            color: '#28C19B'
          - percent: 100
            color: '#F25C54'
    - name: Memory Limits
      type: bargauge
      query: |
        SELECT 'Limits' AS name, ROUND(SUM(memory_limit), 1) AS value
        FROM pod_overview
        WHERE cluster IN (SELECT DISTINCT cluster FROM namespaces)
        HAVING COUNT(memory_limit) > 0
      bargauge:
        group: "Memory"
        max: >-
          size(.dataset.namespaces) > 0 && size(.dataset.node_overview) > 0 ?
          .dataset.node_overview
            .filter(node, has(node.allocatable_memory) && node.allocatable_memory != null && node.cluster == .dataset.namespaces[0].cluster)
            .map(node, double(node.allocatable_memory))
            .sum() : 0.0
        unit: bytes
        format: multiplier
        thresholds:
          - percent: 0
            color: '#F25C54'
          - percent: 30
            color: '#F4B23C'
          - percent: 100
            color: '#28C19B'
          - percent: 400
            color: '#F25C54'
    {{- end }}
    {{- if .Values.views.nodes.enabled }}
    - name: CPU Real Usage
      type: bargauge
      query: |
        SELECT 'Real' AS name, ROUND(SUM(cpu), 1) AS value
        FROM node_overview
        WHERE cluster IN (SELECT DISTINCT cluster FROM namespaces)
          AND cpu IS NOT NULL
        HAVING COUNT(cpu) > 0
      bargauge:
        group: "CPU"
        max: >-
          size(.dataset.namespaces) > 0 && size(.dataset.node_overview) > 0 ?
          .dataset.node_overview
            .filter(node, has(node.allocatable_cpu) && node.allocatable_cpu != null && node.cluster == .dataset.namespaces[0].cluster)
            .map(node, double(node.allocatable_cpu))
            .sum() : 0.0
        unit: millicores
        thresholds:
          - percent: 0
            color: '#28C19B'
          - percent: 70
            color: '#F4B23C'
          - percent: 80
            color: '#F25C54'
    {{- end }}
    {{- if and .Values.views.pods.enabled .Values.views.nodes.enabled }}
    - name: CPU Requests
      type: bargauge
      query: |
        SELECT 'Requests' AS name, ROUND(SUM(cpu_request), 1) AS value
        FROM pod_overview
        WHERE cluster IN (SELECT DISTINCT cluster FROM namespaces)
        HAVING COUNT(cpu_request) > 0
      bargauge:
        group: "CPU"
        max: >-
          size(.dataset.namespaces) > 0 && size(.dataset.node_overview) > 0 ?
          .dataset.node_overview
            .filter(node, has(node.allocatable_cpu) && node.allocatable_cpu != null && node.cluster == .dataset.namespaces[0].cluster)
            .map(node, double(node.allocatable_cpu))
            .sum() : 0.0
        unit: millicores
        format: percentage
        thresholds:
          - percent: 0
            color: '#F25C54'
          - percent: 30
            color: '#F4B23C'
          - percent: 70
            color: '#28C19B'
          - percent: 100
            color: '#F25C54'
    - name: CPU Limits
      type: bargauge
      query: |
        SELECT 'Limits' AS name, ROUND(SUM(cpu_limit), 1) AS value
        FROM pod_overview
        WHERE cluster IN (SELECT DISTINCT cluster FROM namespaces)
        HAVING COUNT(cpu_limit) > 0
      bargauge:
        group: "CPU"
        max: >-
          size(.dataset.namespaces) > 0 && size(.dataset.node_overview) > 0 ?
          .dataset.node_overview
            .filter(node, has(node.allocatable_cpu) && node.allocatable_cpu != null && node.cluster == .dataset.namespaces[0].cluster)
            .map(node, double(node.allocatable_cpu))
            .sum() : 0.0
        unit: millicores
        format: multiplier
        thresholds:
          - percent: 0
            color: '#F25C54'
          - percent: 30
            color: '#F4B23C'
          - percent: 100
            color: '#28C19B'
          - percent: 400
            color: '#F25C54'
    {{- end }}
  columns:
    - name: id
      type: string
      hidden: true
      primaryKey: true
    - name: name
      type: config_item
      width: "4"
      card:
        position: title
      url:
        view:
          filter:
            viewvar__namespace: row.name
            viewvar__cluster: row.cluster
          name: >
            'namespace'
    - name: cpu_usage
      type: gauge
      width: "2"
      unit: millicore
      description: CPU usage
      card:
        position: headerRight
      gauge:
        max: row.cpu_limit
        thresholds:
          - percent: 0
            color: '#28C19B'
          - percent: 70
            color: '#F4B23C'
          - percent: 85
            color: '#F25C54'
    - name: memory_usage
      type: gauge
      width: "2"
      unit: bytes
      card:
        position: headerRight
      description: Memory usage
      gauge:
        max: row.memory_limit
        thresholds:
          - percent: 0
            color: '#28C19B'
          - percent: 75
            color: '#F4B23C'
          - percent: 90
            color: '#F25C54'
    - name: pods
      type: number
      width: "1"
      card:
        position: body
      description: Total number of running pods
    - name: created_at
      type: datetime
      width: "2"
      card:
        position: footer
  {{- if .Values.views.pods.enabled }}
  merge: |
    WITH namespace_metrics AS (
      SELECT
        namespace,
        SUM(cpu) AS cpu_usage,
        SUM(memory) AS memory_usage,
        SUM(CASE WHEN cpu_limit > 0 THEN cpu_limit ELSE cpu_request END) AS cpu_limit,
        SUM(CASE WHEN memory_limit > 0 THEN memory_limit ELSE memory_request END) AS memory_limit,
        SUM(CASE WHEN phase = 'Running' THEN 1 ELSE 0 END) AS pods
      FROM pod_overview
      WHERE cluster IN (SELECT DISTINCT json_extract(tags, '$.cluster') FROM namespaces)
      GROUP BY namespace
    )
    SELECT
      namespaces.id,
      namespaces.name,
      json_extract(namespaces.tags, '$.cluster') AS cluster,
      namespaces.created_at,
      namespace_metrics.cpu_usage,
      namespace_metrics.memory_usage,
      namespace_metrics.cpu_limit,
      namespace_metrics.memory_limit,
      namespace_metrics.pods
    FROM namespaces
    LEFT JOIN namespace_metrics ON namespaces.name = namespace_metrics.namespace
    ORDER BY name
  {{- else }}
  merge: |
    SELECT
      namespaces.id,
      namespaces.name,
      json_extract(namespaces.tags, '$.cluster') AS cluster,
      namespaces.created_at,
      NULL AS cpu_usage,
      NULL AS memory_usage,
      NULL AS cpu_limit,
      NULL AS memory_limit,
      NULL AS pods
    FROM namespaces
    ORDER BY name
  {{- end }}
  queries:
    resources:
      configs:
        tagSelector: "cluster=$(.var.cluster)"
        agent: "all"
        types:
          - Kubernetes::Node
          - Kubernetes::Namespace
          - Kubernetes::Pod
          - Kubernetes::Deployment
          - Kubernetes::StatefulSet
          - Kubernetes::DaemonSet
          - Kubernetes::PersistentVolume
          - Kubernetes::PersistentVolumeClaim
          - Kubernetes::Ingress
          - Kubernetes::CronJob
    namespaces:
      configs:
        tagSelector: "cluster=$(.var.cluster)"
        agent: "all"
        types:
          - Kubernetes::Namespace
    {{- if .Values.views.nodes.enabled }}
    node_overview:
      columns:
        id: string
        name: string
        cluster: string
        status: string
        health: string
        created_at: datetime
        cpu: decimal
        memory: decimal
        disk: decimal
        pods: decimal
        allocatable_cpu: decimal
        allocatable_memory: decimal
        role: string
        zone: string
        uptime: duration
        load: decimal
        __row__attributes: jsonb
        __grants: jsonb
        request_fingerprint: string
        agent_id: string
        is_pushed: boolean
      viewTableSelector:
        name: nodes
        namespace: {{ .Release.Namespace }}
    {{- end }}
    {{- if .Values.views.pods.enabled }}
    pod_overview:
      columns:
        id: string
        namespace: string
        cluster: string
        name: string
        tags: jsonb
        status: string
        health: string
        memory: decimal
        cpu: decimal
        memory_request: decimal
        memory_limit: decimal
        cpu_request: decimal
        cpu_limit: decimal
        phase: string
        created: datetime
        updated: datetime
        image: string
        node: string
        __row__attributes: jsonb
        __grants: jsonb
        request_fingerprint: string
        agent_id: string
        is_pushed: boolean
      viewTableSelector:
        name: pods
        namespace: {{ .Release.Namespace }}
    {{- end }}
{{- end }}