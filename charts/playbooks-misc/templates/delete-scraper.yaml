# yaml-language-server: $schema=https://raw.githubusercontent.com/flanksource/duty/main/schema/openapi/playbook.schema.json

{{- if and .Values.playbooks.enabled .Values.playbooks.deleteScraper .Values.connectionName }}
---
apiVersion: mission-control.flanksource.com/v1
kind: Playbook
metadata:
  name: delete-scraper
spec:
  title: Delete Scraper
  icon: trash
  category: Mission Control
  description: Soft or hard delete a scraper and all its scraped config items

  configs:
    - types:
        - MissionControl::ScrapeConfig

  parameters:
    - name: mode
      label: Delete Mode
      type: list
      properties:
        options:
          - label: Soft Delete
            value: soft
          - label: Hard Delete
            value: hard

  actions:
    - name: Soft delete scraped config items
      if: .params.mode == 'soft'
      sql:
        connection: "connection://{{ .Values.connectionName }}"
        driver: postgres
        query: |
          UPDATE config_items SET deleted_at = NOW(), updated_at = NOW()
          WHERE scraper_id = '$(.config.id)' AND deleted_at IS NULL

    - name: Soft delete scraper
      if: .params.mode == 'soft'
      sql:
        connection: "connection://{{ .Values.connectionName }}"
        driver: postgres
        query: |
          UPDATE config_scrapers SET deleted_at = NOW()
          WHERE id = '$(.config.id)' AND deleted_at IS NULL

    - name: Hard delete scraper and resources
      if: .params.mode == 'hard'
      sql:
        connection: "connection://{{ .Values.connectionName }}"
        driver: postgres
        query: |
          DELETE FROM components WHERE config_id IN (SELECT id FROM config_items WHERE scraper_id = '$(.config.id)');
          DELETE FROM playbook_runs WHERE config_id IN (SELECT id FROM config_items WHERE scraper_id = '$(.config.id)');
          DELETE FROM evidences WHERE config_id IN (SELECT id FROM config_items WHERE scraper_id = '$(.config.id)');
          UPDATE config_items SET parent_id = NULL WHERE parent_id IN (SELECT id FROM config_items WHERE scraper_id = '$(.config.id)');
          DELETE FROM config_items WHERE scraper_id = '$(.config.id)';
          DELETE FROM external_users WHERE scraper_id = '$(.config.id)';
          DELETE FROM external_groups WHERE scraper_id = '$(.config.id)';
          DELETE FROM external_roles WHERE scraper_id = '$(.config.id)';
          DELETE FROM access_reviews WHERE scraper_id = '$(.config.id)';
          DELETE FROM config_access WHERE scraper_id = '$(.config.id)';
          DELETE FROM config_access_logs WHERE scraper_id = '$(.config.id)';
          DELETE FROM config_scrapers WHERE id = '$(.config.id)';

{{- end }}
